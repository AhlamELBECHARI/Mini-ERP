<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Mini-ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Additional styles for Projects page */
        .filters-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        
        .filter-row {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .form-select {
            width: 100%;
            padding: 10px 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .project-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 25px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        
        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .project-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .project-badge.urgent {
            background: rgba(249, 65, 68, 0.1);
            color: var(--danger);
        }
        
        .project-badge.warning {
            background: rgba(248, 150, 30, 0.1);
            color: var(--warning);
        }
        
        .project-badge.success {
            background: rgba(76, 201, 240, 0.1);
            color: var(--success);
        }
        
        .btn-icon {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .btn-icon.small {
            width: 30px;
            height: 30px;
            font-size: 0.9rem;
        }
        
        .project-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        
        .project-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .project-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .project-progress {
            margin-bottom: 20px;
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .progress {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 1s ease;
        }
        
        .project-team {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .team-members {
            display: flex;
            align-items: center;
        }
        
        .team-members img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid var(--bg-card);
            margin-left: -8px;
        }
        
        .team-members img:first-child {
            margin-left: 0;
        }
        
        .more-count {
            margin-left: 5px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .project-stats {
            display: flex;
            gap: 15px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .table th {
            font-weight: 600;
            color: var(--text-secondary);
            padding: 15px;
            border-bottom: 2px solid var(--border-color);
            text-align: left;
        }
        
        .table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .table tr:hover {
            background: rgba(67, 97, 238, 0.05);
        }
        
        .task-info {
            display: flex;
            flex-direction: column;
        }
        
        .task-title {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .task-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-cell img {
            width: 30px;
            height: 30px;
            border-radius: 6px;
        }
        
        .date {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .date.overdue {
            background: rgba(249, 65, 68, 0.1);
            color: var(--danger);
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .badge.urgent {
            background: rgba(249, 65, 68, 0.1);
            color: var(--danger);
        }
        
        .badge.high {
            background: rgba(248, 150, 30, 0.1);
            color: var(--warning);
        }
        
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        
        .team-selector {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            min-height: 100px;
        }
        
        .modal-content {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .modal-header {
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-footer {
            border-top: 1px solid var(--border-color);
        }
        
        .btn-close {
            filter: invert(1);
        }
    </style>
</head>
<body class="dark-mode">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-left">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-cubes"></i>
                </div>
                <span class="logo-text">Mini-ERP</span>
            </div>
        </div>
        
        <div class="navbar-right">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Rechercher un projet...">
            </div>
            
            <div class="nav-icons">
                <button class="nav-icon" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="nav-icon">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <button class="nav-icon">
                    <i class="fas fa-envelope"></i>
                    <span class="badge">5</span>
                </button>
                
                <div class="user-dropdown">
                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=4361ee&color=fff" alt="User">
                    </div>
                    <div class="user-info">
                        <span class="user-name">Sophie Martin</span>
                        <span class="user-role">Chef de Projet</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item">
                <i class="fas fa-tachometer-alt"></i>
                <span>Tableau de Bord</span>
            </a>
            <a href="projets.html" class="menu-item active">
                <i class="fas fa-project-diagram"></i>
                <span>Projets</span>
            </a>
            <a href="rh.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span>RH & Congés</span>
            </a>
            <a href="documents.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span>Documents</span>
            </a>
            <a href="workflow.html" class="menu-item">
                <i class="fas fa-stream"></i>
                <span>Workflow</span>
            </a>
            <a href="reporting.html" class="menu-item">
                <i class="fas fa-chart-bar"></i>
                <span>Reporting</span>
            </a>
            <a href="parametres.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>Paramètres</span>
            </a>
            
            <div class="menu-divider"></div>
            
            <div class="sidebar-footer">
                <div class="user-status">
                    <div class="status-indicator online"></div>
                    <span>En ligne</span>
                </div>
                <button class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="container-fluid">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-project-diagram"></i>
                    Gestion des Projets
                </h1>
                <div class="page-actions">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newProjectModal">
                        <i class="fas fa-plus"></i>
                        Nouveau Projet
                    </button>
                    <button class="btn btn-outline">
                        <i class="fas fa-filter"></i>
                        Filtrer
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <!-- Remplacer les options statiques par des options dynamiques -->
            <div class="filters-card">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Statut</label>
                        <select class="form-select" id="statusFilter">
                            <option value="">Tous</option>
                            <option value="en_cours">En cours</option>
                            <option value="termine">Terminé</option>
                            <option value="en_retard">En retard</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Priorité</label>
                        <select class="form-select" id="priorityFilter">
                            <option value="">Toutes</option>
                            <option value="haute">Haute</option>
                            <option value="moyenne">Moyenne</option>
                            <option value="basse">Basse</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Chef de Projet</label>
                        <select class="form-select" id="chefFilter">
                            <option value="">Tous</option>
                            <!-- Les options seront chargées dynamiquement -->
                        </select>
                    </div>
                    <button class="btn btn-primary" id="applyFilters">
                        <i class="fas fa-search"></i>
                        Appliquer
                    </button>
                </div>
            </div>

            <!-- Projects Grid -->
            <div class="projects-grid">
                <div class="w-100 text-center p-5" style="grid-column: 1/-1;">
                    <i class="fas fa-spinner fa-spin fa-2x mb-3 text-primary"></i>
                    <p class="text-secondary">Chargement des projets...</p>
                </div>
            </div>

            <!-- Tasks Table -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-tasks"></i>
                        Tâches en Retard
                    </h3>
                    <div class="card-actions">
                        <button class="btn btn-sm btn-outline">
                            Voir toutes
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Tâche</th>
                                    <th>Projet</th>
                                    <th>Assignée à</th>
                                    <th>Échéance</th>
                                    <th>Priorité</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="6" class="text-center p-4">
                                        <i class="fas fa-spinner fa-spin mb-2 text-primary"></i>
                                        <p class="text-secondary mb-0">Chargement des tâches...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- New Project Modal -->
    <div class="modal fade" id="newProjectModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nouveau Projet</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newProjectForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Nom du projet *</label>
                                    <input type="text" class="form-control" name="nom" placeholder="Ex: Projet Omega" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Chef de projet *</label>
                                    <select class="form-control" name="chef_projet_id" id="chefSelectModal" required>
                                        <option value="">Sélectionner...</option>
                                        <!-- Options chargées dynamiquement -->
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" name="description" rows="3" placeholder="Description du projet..."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Date de début *</label>
                                    <input type="date" class="form-control" name="date_debut" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Date de fin *</label>
                                    <input type="date" class="form-control" name="date_fin" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Budget (€)</label>
                                    <input type="number" class="form-control" name="budget" placeholder="€" step="1000">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Priorité *</label>
                                    <select class="form-control" name="priorite" required>
                                        <option value="haute">Haute</option>
                                        <option value="moyenne" selected>Moyenne</option>
                                        <option value="basse">Basse</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Membres de l'équipe</label>
                            <div class="team-selector" id="teamSelector" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px;">
                                <!-- Les membres seront chargés dynamiquement -->
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" form="newProjectForm" class="btn btn-primary" id="createProjectBtn">
                        Créer le projet
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/services.js"></script>
    <script src="js/script.js"></script>
    <script src="js/projets.js"></script>
    <script>
        // Initialisation de la page projets
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Page projets initialisée');
            
            // Vérifier l'authentification
            if (!authService.user) {
                const isAuthenticated = await authService.checkSession();
                if (!isAuthenticated) {
                    window.location.href = 'login.html';
                    return;
                }
            }
            
            // Charger la page projets
            await loadProjectsPage();
            
            // Initialiser les modales Bootstrap
            const projectModal = document.getElementById('newProjectModal');
            if (projectModal) {
                projectModal.addEventListener('shown.bs.modal', function() {
                    // Recharger les utilisateurs à chaque ouverture de modal
                    loadUsersForProjectForm();
                });
            }
        });
    </script>
    
</body>
</html>
